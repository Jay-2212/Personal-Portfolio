<svg viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Sans, Inter, sans-serif">
  <defs>
    <style>
      .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
      .card { fill: #FFFFFF; stroke: #E6E4E0; stroke-width: 1; }
    </style>
  </defs>

  <!-- Page background -->
  <rect x="0" y="0" width="1280" height="900" fill="#F7F7F5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="64" fill="#FFFFFF"/>
  <line x1="0" y1="64" x2="1280" y2="64" stroke="#E6E4E0" stroke-width="1"/>
  <circle cx="40" cy="32" r="12" fill="#1E2A3A"/>
  <path d="M 34 32 L 38 36 L 46 26" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="64" y="28" font-size="15" font-weight="600" fill="#1C1C1A">CapexIQ</text>
  <text x="64" y="46" font-size="11" fill="#8A8883">MRI &#183; 100-bed hospital &#183; Tier 2 city</text>

  <rect x="988" y="18" width="88" height="28" rx="6" fill="#FFFFFF" stroke="#D8D6D1"/>
  <text x="1032" y="36" font-size="12" fill="#5C5B57" text-anchor="middle">Methodology</text>
  <rect x="1088" y="18" width="150" height="28" rx="6" fill="#1E2A3A"/>
  <text x="1163" y="36" font-size="12" fill="#FFFFFF" text-anchor="middle">Export &#9662;</text>

  <!-- Investment Outlook card -->
  <g>
    <rect x="32" y="96" width="320" height="216" rx="10" class="card"/>
    <text x="56" y="130" font-size="12" fill="#5C5B57">INVESTMENT OUTLOOK</text>

    <!-- gauge -->
    <path d="M 96 230 A 60 60 0 1 1 216 230" fill="none" stroke="#E6E4E0" stroke-width="12"/>
    <path d="M 96 230 A 60 60 0 1 1 198 268" fill="none" stroke="#0F7B4D" stroke-width="12" stroke-linecap="round"/>
    <text x="156" y="222" font-size="30" font-weight="700" fill="#1C1C1A" text-anchor="middle" class="mono">78</text>
    <text x="156" y="240" font-size="11" fill="#8A8883" text-anchor="middle">/ 100</text>

    <rect x="246" y="150" width="76" height="26" rx="13" fill="#E9F6EF"/>
    <text x="284" y="167" font-size="12" font-weight="600" fill="#0F7B4D" text-anchor="middle">Strong</text>

    <text x="56" y="292" font-size="11" fill="#8A8883">Based on your entered assumptions</text>
  </g>

  <!-- Metric grid: 3 columns x 2 rows -->
  <!-- row 1 -->
  <g>
    <rect x="368" y="96" width="290" height="100" rx="10" class="card"/>
    <text x="390" y="126" font-size="11" fill="#8A8883">SIMPLE PAYBACK</text>
    <text x="390" y="164" font-size="26" font-weight="700" fill="#1C1C1A" class="mono">3.8 yrs</text>

    <rect x="674" y="96" width="290" height="100" rx="10" class="card"/>
    <text x="696" y="126" font-size="11" fill="#8A8883">ROI (BILLED VIEW)</text>
    <text x="696" y="164" font-size="26" font-weight="700" fill="#1C1C1A" class="mono">24%</text>

    <rect x="980" y="96" width="268" height="100" rx="10" class="card"/>
    <text x="1002" y="126" font-size="11" fill="#8A8883">NPV</text>
    <text x="1002" y="164" font-size="26" font-weight="700" fill="#1C1C1A" class="mono">&#8377;1.4 Cr</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="368" y="208" width="290" height="104" rx="10" class="card"/>
    <text x="390" y="238" font-size="11" fill="#8A8883">IRR</text>
    <text x="390" y="276" font-size="26" font-weight="700" fill="#1C1C1A" class="mono">18.2%</text>

    <rect x="674" y="208" width="290" height="104" rx="10" class="card"/>
    <text x="696" y="238" font-size="11" fill="#8A8883">BREAK-EVEN USAGE</text>
    <text x="696" y="276" font-size="26" font-weight="700" fill="#1C1C1A" class="mono">11 / day</text>

    <rect x="980" y="208" width="268" height="104" rx="10" fill="#FBF1E1" stroke="#F0DCB4"/>
    <text x="1002" y="238" font-size="11" fill="#8A6A1F">WORKING CAPITAL GAP</text>
    <text x="1002" y="276" font-size="26" font-weight="700" fill="#8A5A1F" class="mono">&#8377;18L</text>
  </g>

  <!-- View toggle tabs -->
  <g>
    <rect x="32" y="336" width="1216" height="40" rx="8" fill="#FFFFFF" stroke="#E6E4E0"/>
    <rect x="40" y="344" width="150" height="24" rx="6" fill="#EAF0F5"/>
    <text x="115" y="360" font-size="12" font-weight="600" fill="#3E5C76" text-anchor="middle">Billed view</text>
    <text x="290" y="360" font-size="12" fill="#8A8883" text-anchor="middle">Realized view</text>
    <text x="470" y="360" font-size="12" fill="#8A8883" text-anchor="middle">Cash-flow after EMI</text>
  </g>

  <!-- Charts row -->
  <g>
    <!-- Break-even chart -->
    <rect x="32" y="396" width="592" height="280" rx="10" class="card"/>
    <text x="56" y="428" font-size="13" font-weight="600" fill="#1C1C1A">Break-even analysis</text>
    <text x="56" y="446" font-size="11" fill="#8A8883">Revenue and cost vs. usage per day</text>

    <!-- axes -->
    <line x1="80" y1="640" x2="592" y2="640" stroke="#D8D6D1"/>
    <line x1="80" y1="470" x2="80" y2="640" stroke="#D8D6D1"/>

    <!-- fixed cost line (flat-ish) -->
    <path d="M 80 590 L 592 590" stroke="#B7791F" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="500" y="583" font-size="10" fill="#B7791F">Fixed + variable cost</text>

    <!-- revenue line (rising) -->
    <path d="M 80 630 L 592 480" stroke="#0F7B4D" stroke-width="2.5" fill="none"/>
    <text x="470" y="500" font-size="10" fill="#0F7B4D">Billed revenue</text>

    <!-- break-even marker -->
    <circle cx="340" cy="590" r="4" fill="#1E2A3A"/>
    <line x1="340" y1="590" x2="340" y2="640" stroke="#1E2A3A" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="340" y="658" font-size="10" fill="#1C1C1A" text-anchor="middle">11 uses/day</text>
  </g>

  <g>
    <!-- Cumulative cash flow chart -->
    <rect x="656" y="396" width="592" height="280" rx="10" class="card"/>
    <text x="680" y="428" font-size="13" font-weight="600" fill="#1C1C1A">Cumulative cash flow</text>
    <text x="680" y="446" font-size="11" fill="#8A8883">After EMI and launch delay, by year</text>

    <line x1="704" y1="640" x2="1216" y2="640" stroke="#D8D6D1"/>
    <line x1="704" y1="470" x2="704" y2="640" stroke="#D8D6D1"/>

    <!-- bars: negative then rising -->
    <rect x="730" y="560" width="46" height="80" fill="#B23B3B" opacity="0.85"/>
    <rect x="800" y="580" width="46" height="60" fill="#B23B3B" opacity="0.6"/>
    <rect x="870" y="600" width="46" height="40" fill="#B7791F" opacity="0.8"/>
    <rect x="940" y="560" width="46" height="80" fill="#0F7B4D" opacity="0.55"/>
    <rect x="1010" y="520" width="46" height="120" fill="#0F7B4D" opacity="0.75"/>
    <rect x="1080" y="480" width="46" height="160" fill="#0F7B4D"/>
    <text x="753" y="656" font-size="9" fill="#8A8883" text-anchor="middle">Y1</text>
    <text x="823" y="656" font-size="9" fill="#8A8883" text-anchor="middle">Y2</text>
    <text x="893" y="656" font-size="9" fill="#8A8883" text-anchor="middle">Y3</text>
    <text x="963" y="656" font-size="9" fill="#8A8883" text-anchor="middle">Y4</text>
    <text x="1033" y="656" font-size="9" fill="#8A8883" text-anchor="middle">Y5</text>
    <text x="1103" y="656" font-size="9" fill="#8A8883" text-anchor="middle">Y6</text>
    <line x1="704" y1="600" x2="1216" y2="600" stroke="#8A8883" stroke-width="1" stroke-dasharray="2 3"/>
  </g>

  <!-- Risk insight callout -->
  <g>
    <rect x="32" y="700" width="1216" height="150" rx="10" fill="#FBF1E1" stroke="#F0DCB4"/>
    <circle cx="64" cy="726" r="9" fill="#B7791F"/>
    <text x="64" y="731" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">!</text>
    <text x="86" y="731" font-size="13" font-weight="600" fill="#1C1C1A">Key risk notes</text>

    <text x="64" y="758" font-size="12" fill="#3A3936">Main risk: profitability is most sensitive to daily utilization &#8212; if usage falls below 11 scans/day, the</text>
    <text x="64" y="778" font-size="12" fill="#3A3936">investment may not break even within its useful life.</text>
    <text x="64" y="802" font-size="12" fill="#3A3936">Cash-flow risk: TPA / government collections are delayed relative to EMI obligations, creating a</text>
    <text x="64" y="822" font-size="12" fill="#3A3936">working-capital gap of approximately &#8377;18L during the first 4 months.</text>
  </g>

  <text x="32" y="880" font-size="10" fill="#8A8883">Indicative only, based on entered assumptions and editable benchmarks &#8212; not financial advice.</text>
</svg>
